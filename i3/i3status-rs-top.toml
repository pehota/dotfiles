# theme = "gruvbox-dark"
icons = "awesome"

[[block]]
block = "temperature"
collapsed = false
interval = 10
format = "{min}° min, {max}° max, {average}° avg"

[[block]]
block = "disk_space"
path = "/"
alias = ""
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0

[[block]]
block = "memory"
display_type = "memory"
format_mem = "{Mup}%"
format_swap = "{SUp}%"

[[block]]
block = "cpu"
interval = 1

[[block]]
block = "load"
interval = 1
format = "{1m}"


[[block]]
block = "music"
player = "spotify"
buttons = ["play", "next"]

[[block]]
block = "sound"
step_width = 1

[[block]]
block = "battery"
# interval = 10
upower=true
format = "{percentage}% {time}"

# [[block]]
# block = "weather"
# format = "{weather} ({location}) {temp}°, {wind} m/s {direction}"
# service = { name = "openweathermap", api_key = "XXX", city_id = "5398563", units = "metric" }

[[block]]
block = "custom"
command = "xkblayout-state print %s"
interval = 0.25

[[block]]
block = "time"
interval = 60
format = "%a %d %b %R"

[theme]
name = "gruvbox-dark"
[theme.overrides]
idle_bg = "#282828"
info_bg = "#458588"
good_bg = "#98971a"
warning_fg = "#cc241d"
